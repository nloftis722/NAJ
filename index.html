<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NAJ Trucking — Operations Dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='4' fill='%23ffffff'/%3E%3Cpath d='M3 8h9v7H3z M12 11h4l3 3v1h-7z' fill='none' stroke='%23f25826' stroke-width='1.7'/%3E%3Ccircle cx='6.5' cy='16.5' r='1.4' fill='%23f25826'/%3E%3Ccircle cx='16.5' cy='16.5' r='1.4' fill='%23f25826'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --accent:    #f25826;
  --accent-dk: #d2461c;
  --ink:       #333333;
  --ink-strong:#2b2b2b;
  --muted:     #6c6c6c;
  --line:      #e0e0e0;
  --mist:      #eeeeee;
  --paper:     #ffffff;
  --footer:    #2b2b2b;
  --radius:    12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Roboto',Arial,sans-serif;
  color:var(--ink);
  background:var(--mist);
  min-height:100vh;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
.wrap{max-width:1080px;margin:0 auto;padding:0 24px}
header{background:var(--paper);border-bottom:3px solid var(--accent)}
.bar{display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;padding:18px 0}
.brand{display:flex;align-items:center;gap:16px;min-height:52px}
.brand img{height:48px;width:auto;display:block}
.brand .fallback{
  font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:30px;
  letter-spacing:.02em;text-transform:uppercase;color:var(--ink-strong);line-height:1;display:none;
}
.brand .fallback span{color:var(--accent)}
.brand .tagline{
  font-family:'Roboto Condensed',sans-serif;font-weight:500;
  font-size:12px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--muted);margin-top:5px;
}
.clock{text-align:right;font-family:'Roboto Condensed',sans-serif;line-height:1.15}
.clock .time{font-size:24px;font-weight:700;color:var(--ink-strong);font-variant-numeric:tabular-nums;letter-spacing:.02em}
.clock .date{font-size:12px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
section{padding:36px 0 4px}
.eyebrow{
  display:flex;align-items:center;gap:14px;
  font-family:'Roboto Condensed',sans-serif;font-weight:700;
  font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);
  margin-bottom:18px;
}
.eyebrow::after{content:"";flex:1;height:1px;background:var(--line)}
.grid{display:grid;gap:16px}
.tools{grid-template-columns:repeat(2,1fr)}
.links{grid-template-columns:repeat(3,1fr)}
.tile{
  position:relative;display:flex;gap:16px;align-items:flex-start;
  background:var(--paper);border:1px solid var(--line);
  border-radius:var(--radius);padding:22px;overflow:hidden;
  box-shadow:0 1px 2px rgba(0,0,0,.04);
  transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease;
}
.tile::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
  background:var(--accent);transform:scaleY(0);transform-origin:top;
  transition:transform .18s ease;
}
.tile:hover{transform:translateY(-3px);border-color:#d9d9d9;box-shadow:0 14px 30px -16px rgba(0,0,0,.32)}
.tile:hover::before{transform:scaleY(1)}
.tile:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.ico{
  flex:none;width:46px;height:46px;border-radius:10px;display:grid;place-items:center;
  background:#fdece6;border:1px solid #f6cdbd;color:var(--accent);
}
.ico svg{width:24px;height:24px;stroke:currentColor;stroke-width:1.7;fill:none;stroke-linecap:round;stroke-linejoin:round}
.tile:hover .ico{border-color:var(--accent)}
.tile .body{min-width:0}
.tile h3{
  font-family:'Roboto Condensed',sans-serif;font-weight:700;
  font-size:20px;letter-spacing:.02em;text-transform:uppercase;color:var(--ink-strong);line-height:1.12;
}
.tile p{font-size:14px;color:var(--muted);margin-top:5px}
.tile .go{position:absolute;top:20px;right:20px;color:#c4c4c4;transition:color .15s ease,transform .15s ease}
.tile:hover .go{color:var(--accent);transform:translate(2px,-2px)}
.tile .go svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
.links .tile{padding:18px}
.links .ico{width:40px;height:40px}
.links .ico svg{width:21px;height:21px}
.links .tile h3{font-size:17px}
/* ---------- Header weather ---------- */
.header-right{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:flex-end}
.wx{
  display:flex;align-items:stretch;
  background:var(--mist);border:1px solid var(--line);border-radius:10px;overflow:hidden;
}
.wx-head{display:flex;align-items:center;gap:9px;padding:7px 11px;border-right:1px solid var(--line)}
.wx-now-ico{flex:none;width:26px;height:26px;display:grid;place-items:center;color:var(--accent)}
.wx-now-ico svg{width:24px;height:24px}
.wx-now-main{display:flex;align-items:baseline;gap:5px}
.wx-temp{font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:20px;line-height:1;color:var(--ink-strong);font-variant-numeric:tabular-nums}
.wx-cond{font-size:12px;color:var(--ink);font-weight:500}
.wx-meta{font-size:10px;color:var(--muted);margin-top:1px}
.wx-loc{display:none}
.wx-rain-flag{display:inline-flex;align-items:center;gap:4px;margin-top:2px;font-family:'Roboto Condensed',sans-serif;font-weight:600;font-size:9px;letter-spacing:.05em;text-transform:uppercase;padding:1px 7px;border-radius:999px}
.wx-rain-yes{background:#e6f0fb;color:#1f6fb8;border:1px solid #bcd9f2}
.wx-rain-no{background:#eef6ee;color:#3a7d44;border:1px solid #cfe6cf}
.wx-days{display:grid;grid-template-columns:repeat(3,minmax(54px,1fr))}
.wx-day{padding:6px 9px;text-align:center;border-right:1px solid var(--line)}
.wx-day:last-child{border-right:none}
.wx-day .d{font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.wx-day .di{height:18px;display:grid;place-items:center;margin:2px 0;color:var(--accent)}
.wx-day .di svg{width:17px;height:17px}
.wx-day .t{font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:12px;color:var(--ink-strong)}
.wx-day .t .lo{color:var(--muted);font-weight:500;margin-left:3px}
.wx-day .r{font-size:9px;margin-top:1px;font-weight:500}
.wx-day .r.wet{color:#1f6fb8}
.wx-day .r.dry{color:#3a7d44}
.wx-msg{padding:8px 12px;font-size:12px;color:var(--muted)}
/* ---------- KPIs ---------- */
.kpi{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
.kpi-card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 1px 2px rgba(0,0,0,.04);padding:16px 18px}
.kpi-card h4{font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.kpi-days{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi-day{text-align:center;padding:6px 4px;border-radius:9px;background:var(--mist)}
.kpi-day.today{background:#fdece6;border:1px solid #f6cdbd}
.kpi-day .lbl{font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.kpi-day .sub{font-size:10px;color:var(--muted);margin-top:1px}
.kpi-day .val{font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:19px;color:var(--ink-strong);margin-top:5px;font-variant-numeric:tabular-nums}
.kpi-day.today .val{color:var(--accent-dk)}
.mi-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
.mi-total{font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--ink-strong);font-variant-numeric:tabular-nums}
.mi-total span{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-left:5px}
.mi-loadedpct{font-family:'Roboto Condensed',sans-serif;font-weight:700;font-size:14px;color:#3a7d44}
.mi-bar{height:14px;border-radius:7px;overflow:hidden;display:flex;background:var(--mist);border:1px solid var(--line)}
.mi-bar .loaded{background:#3a7d44}
.mi-bar .empty{background:#d2461c}
.mi-legend{display:flex;justify-content:space-between;margin-top:8px;font-size:12px}
.mi-legend .l{color:#3a7d44;font-weight:500}
.mi-legend .e{color:#d2461c;font-weight:500}
.mi-legend b{font-family:'Roboto Condensed',sans-serif}
.kpi-asof{margin-top:10px;font-size:11px;color:var(--muted);font-style:italic}
@media(max-width:720px){ .kpi{grid-template-columns:1fr} }
footer{margin-top:46px;background:var(--footer);color:#cfcfcf}
.foot{display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;align-items:center;padding:26px 0;font-size:13px}
.foot img{height:34px;width:auto;opacity:.95}
.foot a{color:#e4e4e4}
.foot a:hover{color:var(--accent)}
.foot .motto{font-family:'Roboto Condensed',sans-serif;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:#9a9a9a}
@media(max-width:720px){
  .tools{grid-template-columns:1fr}
  .links{grid-template-columns:1fr 1fr}
  .clock{text-align:left}
  .bar{align-items:flex-start}
  .header-right{justify-content:flex-start;width:100%}
  .wx{flex:1 1 auto}
}
@media(max-width:480px){ .links{grid-template-columns:1fr} .clock .time{font-size:21px} }
@media(prefers-reduced-motion:reduce){ *{transition:none!important} .tile:hover{transform:none} }
</style>
</head>
<body>
<header>
  <div class="wrap bar">
    <div>
      <div class="brand">
        <img src="https://najtrucking.com/wp-content/uploads/naj/logo-header.png"
             alt="NAJ Trucking, Inc."
             onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <div class="fallback">NAJ <span>Trucking</span></div>
      </div>
      <div class="tagline">Operations Dashboard</div>
    </div>
    <div class="header-right">
      <div class="clock">
      <div class="time" id="clock-time">&mdash;</div>
      <div class="date" id="clock-date">Twinsburg, OH</div>
    </div>
      <div class="wx" id="wx"><div class="wx-msg">Loading current conditions&hellip;</div></div>
    </div>
  </div>
</header>
<main class="wrap">
  <section>
    <div class="eyebrow">KPIs</div>
    <div class="kpi">
      <div class="kpi-card">
        <h4>Revenue by Day</h4>
        <div class="kpi-days" id="kpi-rev"></div>
        <div class="kpi-asof" id="kpi-asof-rev"></div>
      </div>
      <div class="kpi-card">
        <h4>Empty vs Loaded Miles &middot; Month to Date</h4>
        <div class="mi-top">
          <div class="mi-total" id="mi-total"></div>
          <div class="mi-loadedpct" id="mi-loadedpct"></div>
        </div>
        <div class="mi-bar"><div class="loaded" id="mi-bar-loaded"></div><div class="empty" id="mi-bar-empty"></div></div>
        <div class="mi-legend">
          <span class="l">Loaded <b id="mi-loaded"></b></span>
          <span class="e"><b id="mi-empty"></b> Empty</span>
        </div>
        <div class="kpi-asof" id="kpi-asof-mi"></div>
      </div>
    </div>
  </section>
  <section>
    <div class="eyebrow">Tools</div>
    <div class="grid tools" id="tools-grid"></div>
  </section>
  <section>
    <div class="eyebrow">Resources &amp; Links</div>
    <div class="grid links" id="links-grid"></div>
  </section>
</main>
<footer>
  <div class="wrap foot">
    <img src="https://najtrucking.com/wp-content/uploads/naj/logo-footer.png" alt="NAJ Trucking, Inc."
         onerror="this.style.display='none'">
    <div>8530 North Boyle Parkway &middot; Twinsburg, OH 44087 &middot; <a href="tel:+13304054101">330-405-4101</a></div>
    <div class="motto">Managed by drivers, for drivers</div>
  </div>
</footer>
<script>
const TOOLS = [
  { title:"Freight Rate Calculator", desc:"Generate pneumatic freight quotes", url:"https://nloftis722.github.io/NAJ/naj-trucking-calculator.html", icon:"calc",  newTab:false },
  { title:"CRM",                      desc:"Customer & prospect database",      url:"https://nloftis722.github.io/NAJ/NAJ_CRM_1.html",        icon:"users", newTab:false },
  { title:"Toro TMS",                 desc:"Dispatch & load management",        url:"https://app.torotms.com/naj-trucking-inc",              icon:"truck", newTab:true },
  { title:"Carry-All Schedule", desc:"Trimor carry-all trip scheduling", url:"https://triptools.trimor.com/Trucking/CarryAllSchedule", icon:"truck", newTab:true }
];
const LINKS = [
  { title:"Google Maps",  desc:"Routing & directions",       url:"https://www.google.com/maps",                              icon:"map",   newTab:true },
  { title:"Ohio Turnpike",desc:"E-ZPass toll rates",         url:"https://www.ohioturnpike.org/e-zpass/toll-rates",          icon:"toll",  newTab:true },
  { title:"PA Turnpike",  desc:"Toll calculator",            url:"https://www.paturnpike.com/toll-calculator",               icon:"toll",  newTab:true },
  { title:"WV Turnpike",  desc:"Toll rates & resources",     url:"https://turnpike.wv.gov/traveler-resources/toll-rates",    icon:"toll",  newTab:true }
];
const ICONS = {
  calc:  '<rect x="4" y="2.5" width="16" height="19" rx="2"/><line x1="7.5" y1="6.5" x2="16.5" y2="6.5"/><line x1="7.5" y1="11" x2="8.5" y2="11"/><line x1="11.5" y1="11" x2="12.5" y2="11"/><line x1="15.5" y1="11" x2="16.5" y2="11"/><line x1="7.5" y1="14.5" x2="8.5" y2="14.5"/><line x1="11.5" y1="14.5" x2="12.5" y2="14.5"/><line x1="15.5" y1="14.5" x2="16.5" y2="18"/><line x1="7.5" y1="18" x2="8.5" y2="18"/><line x1="11.5" y1="18" x2="12.5" y2="18"/>',
  users: '<path d="M16 19v-1.5a3.5 3.5 0 0 0-3.5-3.5h-5A3.5 3.5 0 0 0 4 17.5V19"/><circle cx="10" cy="8" r="3.2"/><path d="M20 19v-1.4a3.4 3.4 0 0 0-2.6-3.3"/><path d="M15.5 5.2a3.2 3.2 0 0 1 0 5.6"/>',
  truck: '<path d="M3 6.5h10.5v8.5H3z"/><path d="M13.5 9.5H17l3.5 3.3V15h-7z"/><circle cx="7" cy="17.5" r="1.7"/><circle cx="17" cy="17.5" r="1.7"/><line x1="8.7" y1="17.5" x2="15.3" y2="17.5"/>',
  map:   '<path d="M12 21s6.5-5.5 6.5-10.5a6.5 6.5 0 1 0-13 0C5.5 15.5 12 21 12 21z"/><circle cx="12" cy="10.5" r="2.4"/>',
  toll:  '<path d="M5 20V9l7-4 7 4v11"/><line x1="5" y1="20" x2="19" y2="20"/><line x1="12" y1="5.4" x2="12" y2="20"/><path d="M9 20v-4.5h6V20"/>'
};
const ARROW = '<svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="9 7 17 7 17 15"/></svg>';
function tile(item){
  const a = document.createElement('a');
  a.className = 'tile';
  a.href = item.url;
  if(item.newTab){ a.target = '_blank'; a.rel = 'noopener'; }
  a.setAttribute('aria-label', item.title + ' \u2014 ' + item.desc);
  a.innerHTML =
    '<span class="ico"><svg viewBox="0 0 24 24">'+(ICONS[item.icon]||'')+'</svg></span>' +
    '<span class="body"><h3>'+item.title+'</h3><p>'+item.desc+'</p></span>' +
    '<span class="go">'+ARROW+'</span>';
  return a;
}
function render(list, mountId){
  const m = document.getElementById(mountId);
  list.forEach(i => m.appendChild(tile(i)));
}
render(TOOLS, 'tools-grid');
render(LINKS, 'links-grid');
function updateClock(){
  const now = new Date();
  document.getElementById('clock-time').textContent =
    now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
  document.getElementById('clock-date').textContent =
    now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}).toUpperCase();
}
updateClock();
setInterval(updateClock, 1000);

/* ============================================================
   KPIs  (manual snapshot from Toro TMS)
   ------------------------------------------------------------
   >>> TO UPDATE: read the numbers in Toro and edit the values
       in the KPI object below, then commit. <<<
   - revenue: Booked Order Summary revenue for each day.
   - milesMTD: Reports > KPIs (month-to-date). totalMiles and
     emptyPct; loaded miles are derived automatically.
   - asOf: the date/time you pulled these numbers.
   ============================================================ */
const KPI = {
  asOf: "Tue, Jun 23, 2026, 8:58 AM ET",
  revenue: {
    yesterday: { label: "Yesterday", sub: "Jun 22", value: 19443.10 },
    today:     { label: "Today",     sub: "Jun 23", value: 8627.02 },
    tomorrow:  { label: "Tomorrow",  sub: "Jun 24", value: 2500.00 }
  },
  milesMTD: { totalMiles: 41891, emptyPct: 46.96, period: "Jun 1\u201323" }
};
function fmtMoney(n){ return '$' + Math.round(n).toLocaleString('en-US'); }
function fmtMiles(n){ return Math.round(n).toLocaleString('en-US') + ' mi'; }
function renderKPIs(){
  const r = KPI.revenue;
  const order = [['yesterday',''],['today','today'],['tomorrow','']];
  document.getElementById('kpi-rev').innerHTML = order.map(([k,cls]) => {
    const d = r[k];
    return '<div class="kpi-day '+cls+'">' +
      '<div class="lbl">'+d.label+'</div>' +
      '<div class="sub">'+d.sub+'</div>' +
      '<div class="val">'+fmtMoney(d.value)+'</div>' +
    '</div>';
  }).join('');
  document.getElementById('kpi-asof-rev').textContent = 'As of ' + KPI.asOf;

  const m = KPI.milesMTD;
  const emptyMiles = Math.round(m.totalMiles * m.emptyPct / 100);
  const loadedMiles = m.totalMiles - emptyMiles;
  const loadedPct = 100 - m.emptyPct;
  document.getElementById('mi-total').innerHTML = fmtMiles(m.totalMiles) + '<span>total</span>';
  document.getElementById('mi-loadedpct').textContent = loadedPct.toFixed(1) + '% loaded';
  document.getElementById('mi-bar-loaded').style.width = loadedPct + '%';
  document.getElementById('mi-bar-empty').style.width = m.emptyPct + '%';
  document.getElementById('mi-loaded').textContent = fmtMiles(loadedMiles);
  document.getElementById('mi-empty').textContent = fmtMiles(emptyMiles);
  document.getElementById('kpi-asof-mi').textContent = m.period + ' \u00b7 as of ' + KPI.asOf;
}
renderKPIs();

/* ============================================================
   WEATHER WIDGET  —  Twinsburg, OH
   Data: Open-Meteo (https://open-meteo.com) — free, no API key.
   Shows current conditions + a 3-day rain look-ahead.
   ============================================================ */
const WX_LAT = 41.3126, WX_LON = -81.4401, WX_PLACE = "Twinsburg, OH";
const WX_ICONS = {
  sun:    '<circle cx="12" cy="12" r="4.2"/><line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/><line x1="5.2" y1="5.2" x2="7" y2="7"/><line x1="17" y1="17" x2="18.8" y2="18.8"/><line x1="18.8" y1="5.2" x2="17" y2="7"/><line x1="7" y1="17" x2="5.2" y2="18.8"/>',
  cloud:  '<path d="M7 18h10a3.5 3.5 0 0 0 .3-7A5 5 0 0 0 7.5 9.4 3.8 3.8 0 0 0 7 18z"/>',
  partly: '<circle cx="8.5" cy="8.5" r="3"/><line x1="8.5" y1="2.8" x2="8.5" y2="4.4"/><line x1="2.8" y1="8.5" x2="4.4" y2="8.5"/><line x1="4.4" y1="4.4" x2="5.5" y2="5.5"/><line x1="12.6" y1="4.4" x2="11.5" y2="5.5"/><path d="M9 19h8a3 3 0 0 0 .2-6A4.2 4.2 0 0 0 9.3 11 3.2 3.2 0 0 0 9 19z"/>',
  rain:   '<path d="M7 15h10a3.5 3.5 0 0 0 .3-7A5 5 0 0 0 7.5 6.4 3.8 3.8 0 0 0 7 15z"/><line x1="8" y1="18" x2="7" y2="21"/><line x1="12" y1="18" x2="11" y2="21"/><line x1="16" y1="18" x2="15" y2="21"/>',
  snow:   '<path d="M7 15h10a3.5 3.5 0 0 0 .3-7A5 5 0 0 0 7.5 6.4 3.8 3.8 0 0 0 7 15z"/><line x1="8" y1="19" x2="8" y2="19.5"/><line x1="12" y1="20" x2="12" y2="20.5"/><line x1="16" y1="19" x2="16" y2="19.5"/>',
  storm:  '<path d="M7 14h10a3.5 3.5 0 0 0 .3-7A5 5 0 0 0 7.5 5.4 3.8 3.8 0 0 0 7 14z"/><polyline points="12 14 10 18 13 18 11 22"/>',
  fog:    '<path d="M6 11h11a3.3 3.3 0 0 0 .2-6.6A4.7 4.7 0 0 0 6.5 5.6 3.6 3.6 0 0 0 6 11z"/><line x1="5" y1="15" x2="17" y2="15"/><line x1="7" y1="18.5" x2="15" y2="18.5"/>'
};
function wxCodeInfo(code){
  if(code===0) return {k:'sun',   t:'Clear',          rain:false};
  if(code<=2)  return {k:'partly',t:'Partly cloudy',  rain:false};
  if(code===3) return {k:'cloud', t:'Overcast',       rain:false};
  if(code<=48) return {k:'fog',   t:'Fog',            rain:false};
  if(code<=57) return {k:'rain',  t:'Drizzle',        rain:true};
  if(code<=67) return {k:'rain',  t:'Rain',           rain:true};
  if(code<=77) return {k:'snow',  t:'Snow',           rain:true};
  if(code<=82) return {k:'rain',  t:'Rain showers',   rain:true};
  if(code<=86) return {k:'snow',  t:'Snow showers',   rain:true};
  if(code<=99) return {k:'storm', t:'Thunderstorm',   rain:true};
  return {k:'cloud', t:'—', rain:false};
}
function wxSvg(k){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">'+(WX_ICONS[k]||WX_ICONS.cloud)+'</svg>'; }
function wxDayName(iso){
  const d = new Date(iso + 'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'short'}).toUpperCase();
}
function renderWeather(data){
  const cur = data.current;
  const daily = data.daily;
  const ci = wxCodeInfo(cur.weather_code);
  const todayPop = daily.precipitation_probability_max ? daily.precipitation_probability_max[0] : null;
  const rainSoon = ci.rain || (todayPop !== null && todayPop >= 40);
  let flag = rainSoon
    ? '<span class="wx-rain-flag wx-rain-yes">Rain likely today</span>'
    : '<span class="wx-rain-flag wx-rain-no">No rain expected today</span>';
  let head =
    '<div class="wx-head">' +
      '<div class="wx-now-ico">'+wxSvg(ci.k)+'</div>' +
      '<div>' +
        '<div class="wx-now-main"><span class="wx-temp">'+Math.round(cur.temperature_2m)+'\u00b0</span><span class="wx-cond">'+ci.t+'</span></div>' +
        '<div class="wx-meta">Feels '+Math.round(cur.apparent_temperature)+'\u00b0 \u00b7 Wind '+Math.round(cur.wind_speed_10m)+' mph'+(todayPop!==null?(' \u00b7 '+todayPop+'% chance of precip'):'')+'</div>' +
        flag +
      '</div>' +
      '<div class="wx-loc"><div class="l1">'+WX_PLACE+'</div><div class="l2">3-Day Outlook</div></div>' +
    '</div>';
  let days = '<div class="wx-days">';
  for(let i=0;i<3 && i<daily.time.length;i++){
    const di = wxCodeInfo(daily.weather_code[i]);
    const pop = daily.precipitation_probability_max ? daily.precipitation_probability_max[i] : null;
    const wet = di.rain || (pop!==null && pop>=40);
    days +=
      '<div class="wx-day">' +
        '<div class="d">'+(i===0?'TODAY':wxDayName(daily.time[i]))+'</div>' +
        '<div class="di">'+wxSvg(di.k)+'</div>' +
        '<div class="t">'+Math.round(daily.temperature_2m_max[i])+'\u00b0<span class="lo">'+Math.round(daily.temperature_2m_min[i])+'\u00b0</span></div>' +
        '<div class="r '+(wet?'wet':'dry')+'">'+(pop!==null?(pop+'% rain'):di.t)+'</div>' +
      '</div>';
  }
  days += '</div>';
  document.getElementById('wx').innerHTML = head + days;
}
function loadWeather(){
  const url = 'https://api.open-meteo.com/v1/forecast?latitude='+WX_LAT+'&longitude='+WX_LON+
    '&current=temperature_2m,apparent_temperature,weather_code,wind_speed_10m' +
    '&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max' +
    '&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America%2FNew_York&forecast_days=3';
  fetch(url)
    .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(renderWeather)
    .catch(e => {
      document.getElementById('wx').innerHTML =
        '<div class="wx-msg">Weather is unavailable right now. ' +
        '<a href="https://forecast.weather.gov/MapClick.php?lat='+WX_LAT+'&lon='+WX_LON+'" target="_blank" rel="noopener" style="color:var(--accent)">Open full forecast \u2197</a></div>';
    });
}
loadWeather();
setInterval(loadWeather, 15*60*1000);
</script>
