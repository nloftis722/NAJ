<style>:root{
  --bg:#0E1216;--bg2:#11161C;--surface:#171D24;--card:#1E262F;--card2:#232C36;
  --line:#2A333D;--line2:#374350;
  --txt:#E8EDF2;--muted:#93A1B0;--faint:#67737F;
  --orange:#F25826;--orange-d:#D2461C;--orange-soft:rgba(242,88,38,.14);
  --lime:#A3E635;--lime-soft:rgba(163,230,53,.13);
  --blue:#38BDF8;--blue-soft:rgba(56,189,248,.12);
  --red:#F87171;--red-soft:rgba(248,113,113,.12);
  --violet:#A78BFA;--violet-soft:rgba(167,139,250,.12);
  --r:10px;--r-sm:7px;
  --shadow:0 1px 0 rgba(255,255,255,.02),0 10px 30px -14px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%}
body{background:radial-gradient(1100px 560px at 84% -12%,rgba(242,88,38,.06),transparent 60%),var(--bg);
  color:var(--txt);font-family:"Barlow",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;overflow:hidden}
h1,h2,h3,h4,.disp{font-family:"Oswald","Barlow Semi Condensed",sans-serif;font-weight:600;letter-spacing:.02em;margin:0}
.eyebrow{font-family:"Oswald",sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:10.5px;color:var(--faint);font-weight:500}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:20px;border:2px solid var(--bg)}
::selection{background:var(--orange);color:#fff}

.hazard{height:4px;width:100%;background:repeating-linear-gradient(135deg,var(--orange) 0 14px,#10141a 14px 28px);opacity:.92}
.topbar{display:flex;align-items:center;gap:16px;padding:0 18px;height:62px;
  background:linear-gradient(180deg,#141a21,#10151b);border-bottom:1px solid var(--line)}
.logo-chip{background:#fff;border-radius:9px;padding:6px 11px;display:flex;align-items:center;
  box-shadow:0 4px 16px -6px rgba(0,0,0,.6)}
.logo-chip img{height:30px;display:block}
.logo-img{display:block;height:30px;width:72px;background:var(--logo) center/contain no-repeat}
.app-name{font-family:"Oswald";font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:14px;color:var(--muted)}
.search{flex:1;max-width:440px;position:relative}
.search input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:8px;
  padding:9px 12px 9px 34px;color:var(--txt);font-size:13.5px;outline:none}
.search input:focus{border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-soft)}
.search .si{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--faint);font-size:15px}
.top-right{display:flex;align-items:center;gap:9px;margin-left:auto}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--card2);border:1px solid var(--line2);
  display:grid;place-items:center;font-family:"Oswald";font-weight:600;font-size:13px;color:var(--orange)}

.shell{display:grid;grid-template-columns:212px 1fr;height:calc(100vh - 66px)}
.side{background:var(--bg2);border-right:1px solid var(--line);padding:14px 10px;display:flex;flex-direction:column;gap:2px;overflow:auto}
.nav-i{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:8px;color:var(--muted);font-weight:500;font-size:13.5px;width:100%;text-align:left}
.nav-i i{font-size:17px;width:18px;text-align:center}
.nav-i.on{background:var(--orange-soft);color:var(--orange)}
.nav-i:hover:not(.on){background:var(--card);color:var(--txt)}
.nav-i .count{margin-left:auto;font-size:11px;color:var(--faint);font-family:"Oswald"}
.nav-i.on .count{color:var(--orange)}
.nav-sec{font-family:"Oswald";text-transform:uppercase;letter-spacing:.15em;font-size:9.5px;color:var(--faint);padding:14px 12px 6px}
.view{overflow:auto;height:100%}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:20px;
  letter-spacing:.04em;text-transform:uppercase;font-family:"Oswald";border:1px solid transparent;white-space:nowrap}
.b-orange{background:var(--orange-soft);color:var(--orange);border-color:rgba(242,88,38,.32)}
.b-lime{background:var(--lime-soft);color:var(--lime);border-color:rgba(163,230,53,.3)}
.b-blue{background:var(--blue-soft);color:var(--blue);border-color:rgba(56,189,248,.3)}
.b-red{background:var(--red-soft);color:var(--red);border-color:rgba(248,113,113,.3)}
.b-violet{background:var(--violet-soft);color:var(--violet);border-color:rgba(167,139,250,.3)}
.b-ghost{background:var(--card2);color:var(--muted);border-color:var(--line2)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}

.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border-radius:8px;font-weight:600;font-size:13px;
  border:1px solid var(--line2);background:var(--card);color:var(--txt);transition:.13s}
.btn:hover{background:var(--card2);transform:translateY(-1px)}
.btn i{font-size:16px}
.btn-orange{background:linear-gradient(135deg,var(--orange),var(--orange-d));color:#fff;border:none;box-shadow:0 6px 16px -8px rgba(242,88,38,.85)}

const MQ = (typeof window!=='undefined' && window.matchMedia) ? window.matchMedia('(max-width:820px)') : {matches:false,addEventListener:function(){}};

function lsGet(k){try{return localStorage.getItem(k)}catch(e){return null}}
function lsSet(k,v){try{localStorage.setItem(k,v)}catch(e){}}
function save(){lsSet(CRM_KEY, JSON.stringify(state))}
function load(){
  const raw=lsGet(CRM_KEY);
  state = raw ? JSON.parse(raw) : JSON.parse(JSON.stringify(SEED));
  if(!state.settings) state.settings=JSON.parse(JSON.stringify(SEED.settings));
  if(!state.quotes) state.quotes=[];
  mergeCalcQuotes();
}
/* pull quotes the calculator saved (same-origin localStorage) into the CRM */
function mergeCalcQuotes(){
  let calc=[]; try{calc=JSON.parse(lsGet(CALC_KEY)||'[]')}catch(e){}
  const have=new Set(state.quotes.map(q=>q.id));
  let added=0;
  calc.forEach(q=>{ if(!have.has(q.id)){ const c={...q}; c.accountId=matchAccount(q.customerName); state.quotes.unshift(c); added++; }});
  if(added) save();
  return added;
}
function matchAccount(name){ if(!name) return null;
  const n=name.toLowerCase().trim();
  let a=state.accounts.find(x=>x.company.toLowerCase()===n)
     || state.accounts.find(x=>x.company.toLowerCase().includes(n)||n.includes(x.company.toLowerCase()));
  return a?a.id:null;
}

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s);
function esc(s){return (s==null?'':''+s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function money(n){return '$'+Math.round(n||0).toLocaleString()}
function uid(p){return p+'_'+Math.random().toString(36).slice(2,8)}
function acc(id){return state.accounts.find(a=>a.id===id)}
function initials(a){return (a.company||'?').replace(/[^A-Za-z ]/g,'').split(/\s+/).filter(Boolean).slice(0,2).map(s=>s[0]).join('').toUpperCase()||'#'}
function primary(a){return a.contacts.find(c=>c.role==='primary')||a.contacts[0]||{}}
function tel(c){return c.mobile||c.office||''}
function cleanNote(s){return esc((s||'').replace(/\((Daily|Weekly)\)/g,'').trim())}
function phoneHref(n){const d=(n||'').replace(/[^\d+]/g,'');return d?'tel:'+d:''}
function telLink(n,ic,lab){const h=phoneHref(n);return h?`<a class="field act" href="${h}"><i class="ti ${ic}"></i>${esc(lab||n)}</a>`:''}
function mailLink(e){return e?`<a class="field act" href="mailto:${esc(e)}"><i class="ti ti-mail"></i>${esc(e)}</a>`:''}
function segLabel(k){const s=(state.settings.segments||[]).find(x=>x.key===k);return s?s.label:k}
function contLabel(k){const c=state.settings.containers.find(x=>x.key===k);return c?c.label:k}
function enabledContainers(){return state.settings.containers.filter(c=>c.enabled)}
function accountsIn(k){return state.accounts.filter(a=>a.container===k)}
function oppsFor(a){return a.opportunities||[]}
function quotesFor(id){return state.quotes.filter(q=>q.accountId===id)}

    list=list.filter(a=>a.company.toLowerCase().includes(q)||
      a.contacts.some(c=>((c.first||'')+' '+(c.last||'')+' '+(c.title||'')+' '+(c.notes||'')+' '+(c.email||'')).toLowerCase().includes(q)));}

    ui.selId = list[0] ? list[0].id : null;

/* ---------- modals ---------- */
function openModal(title,body,foot,wide){
  closeModal();
  const s=document.createElement('div');s.className='scrim';s.id='scrim';s.onclick=e=>{if(e.target===s)closeModal()};
  s.innerHTML=`<div class="modal ${wide?'wide':''}"><div class="m-head"><h3>${esc(title)}</h3><button class="icon-btn x" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="m-body">${body}</div><div class="m-foot">${foot}</div></div>`;
  document.body.appendChild(s);
}
function closeModal(){const s=$('#scrim');if(s)s.remove()}
function fInput(id,label,val,type,ph){return `<div class="f"><label>${esc(label)}</label><input id="${id}" type="${type||'text'}" value="${esc(val==null?'':val)}" placeholder="${esc(ph||'')}"></div>`}
function fSelect(id,label,val,opts){return `<div class="f"><label>${esc(label)}</label><select id="${id}">${opts.map(o=>{const[v,l]=Array.isArray(o)?o:[o,o];return `<option value="${esc(v)}" ${v===val?'selected':''}>${esc(l)}</option>`}).join('')}</select></div>`}
function fArea(id,label,val,ph){return `<div class="f"><label>${esc(label)}</label><textarea id="${id}" placeholder="${esc(ph||'')}">${esc(val||'')}</textarea></div>`}
function customFieldInputs(defs,obj){return defs.length?`<div class="sub-h">Custom fields<span class="ln"></span></div>`+
  defs.map(f=>`<div class="frow one">${f.type==='number'?fInput('cf_'+f.key,f.label,(obj.customFields||{})[f.key],'number'):fInput('cf_'+f.key,f.label,(obj.customFields||{})[f.key])}</div>`).join(''):''}
function collectCustom(defs){const o={};defs.forEach(f=>{const v=$('#cf_'+f.key).value.trim();if(v)o[f.key]=v});return o}

/* account add/edit */
function editAccount(id){const a=id?acc(id):{company:'',container:'customer',segment:'ready-mix',cadence:'',customFields:{}};
  const conts=enabledContainers().map(c=>[c.key,c.label]);
  const segs=state.settings.segments.map(s=>[s.key,s.label]);
  openModal(id?'Edit account':'New account',
    `<div class="frow one">${fInput('a_company','Company',a.company,'text','e.g. Medina Supply')}</div>
     <div class="frow">${fSelect('a_container','Container',a.container,conts)}${fSelect('a_segment','Account type',a.segment,segs)}</div>
     <div class="frow one">${fSelect('a_cadence','Call cadence',a.cadence||'',[['','None'],['Daily','Daily'],['Weekly','Weekly']])}</div>
     ${customFieldInputs(state.settings.accountFields,a)}`,
    `${id?`<button class="btn btn-danger" onclick="delAccount('${id}')"><i class="ti ti-trash"></i>Delete</button>`:''}<div class="spacer"></div>
     <button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-orange" onclick="saveAccount('${id||''}')"><i class="ti ti-check"></i>Save</button>`);
}
function saveAccount(id){
  const company=$('#a_company').value.trim(); if(!company){toast('Company name required');return}
  const o={company,container:$('#a_container').value,segment:$('#a_segment').value,cadence:$('#a_cadence').value,customFields:collectCustom(state.settings.accountFields)};
  if(id){Object.assign(acc(id),o)}
  else{const na={id:uid('acc'),...o,contacts:[],opportunities:[]};state.accounts.push(na);ui.selId=na.id;ui.view='records';}
  save();closeModal();render();toast('Account saved');
}
function delAccount(id){if(!confirm('Delete this account and all its contacts?'))return;
  state.accounts=state.accounts.filter(a=>a.id!==id);state.quotes.forEach(q=>{if(q.accountId===id)q.accountId=null});
  ui.selId=null;save();closeModal();render();toast('Account deleted')}

function editContact(aid,cid){const a=acc(aid);const c=cid?a.contacts.find(x=>x.id===cid):{first:'',last:'',title:'',email:'',mobile:'',office:'',ext:'',notes:'',role:'primary',customFields:{}};
  openModal(cid?'Edit contact':'New contact',
    `<div class="frow">${fInput('c_first','First name',c.first)}${fInput('c_last','Last name',c.last)}</div>
     <div class="frow">${fInput('c_title','Title',c.title,'text','e.g. Dispatch')}${fSelect('c_role','Role',c.role||'primary',[['primary','Primary'],['backup','Backup / secondary']])}</div>
     <div class="frow">${fInput('c_mobile','Mobile',c.mobile)}${fInput('c_office','Office',c.office)}</div>
     <div class="frow">${fInput('c_ext','Ext.',c.ext)}${fInput('c_email','Email',c.email)}</div>
     <div class="frow one">${fInput('c_backup','Backup for (name)',c.backup_of,'text','optional')}</div>
     <div class="frow one">${fArea('c_notes','Notes',c.notes,'Plant/product, cadence, call time, backup chain\u2026')}</div>
     ${customFieldInputs(state.settings.contactFields,c)}`,
    `${cid?`<button class="btn btn-danger" onclick="delContact('${aid}','${cid}')"><i class="ti ti-trash"></i>Delete</button>`:''}<div class="spacer"></div>
     <button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-orange" onclick="saveContact('${aid}','${cid||''}')"><i class="ti ti-check"></i>Save</button>`);
}
function saveContact(aid,cid){const a=acc(aid);
  const first=$('#c_first').value.trim(); if(!first){toast('First name required');return}
  const o={first,last:$('#c_last').value.trim(),title:$('#c_title').value.trim(),role:$('#c_role').value,
    mobile:$('#c_mobile').value.trim(),office:$('#c_office').value.trim(),ext:$('#c_ext').value.trim(),
    email:$('#c_email').value.trim(),backup_of:$('#c_backup').value.trim(),notes:$('#c_notes').value.trim(),
    customFields:collectCustom(state.settings.contactFields)};
  if(cid){Object.assign(a.contacts.find(x=>x.id===cid),o)}
  else{a.contacts.push({id:uid('c'),...o})}
  save();closeModal();render();toast('Contact saved');
}
function delContact(aid,cid){if(!confirm('Delete this contact?'))return;const a=acc(aid);a.contacts=a.contacts.filter(x=>x.id!==cid);save();closeModal();render();toast('Contact deleted')}

/* opportunity add/edit */
function addOpp(aid){editOpp(aid,null)}
function editOpp(aid,oid){
  const custs=accountsIn('customer');
  let a=aid?acc(aid):null, o=null;
  if(oid&&a)o=a.opportunities.find(x=>x.id===oid);
  if(!o)o={name:'',material:'',lane:'',stage:'Lead',value:0,prob:30,note:'',quoteId:null,customFields:{}};
  const linkable=aid?quotesFor(aid):[];
  openModal(oid?'Edit opportunity':'New opportunity',
    `<div class="frow one">${fSelect('o_acct','Customer',aid||'',custs.map(c=>[c.id,c.company]))}</div>
     <div class="frow one">${fInput('o_name','Opportunity name',o.name,'text','e.g. Slag \u2014 Plant #1 program')}</div>
     <div class="frow">${fInput('o_material','Material / type',o.material)}${fInput('o_lane','Lane',o.lane,'text','origin \u2192 dest')}</div>
     <div class="frow">${fSelect('o_stage','Stage',o.stage,state.settings.stages)}${fInput('o_value','Value ($/yr est.)',o.value,'number')}</div>
     <div class="frow">${fInput('o_prob','Probability %',o.prob,'number')}${fSelect('o_quote','Link a quote',o.quoteId||'',[['','None'],...linkable.map(q=>[String(q.id),(q.projectName!=='N/A'?q.projectName:q.productType)+' \u2014 '+money(q.totalRevenue)])])}</div>
     <div class="frow one">${fArea('o_note','Note',o.note)}</div>
     ${customFieldInputs(state.settings.opportunityFields,o)}`,
    `${oid?`<button class="btn btn-danger" onclick="delOpp('${aid}','${oid}')"><i class="ti ti-trash"></i>Delete</button>`:''}<div class="spacer"></div>
     <button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-orange" onclick="saveOpp('${aid||''}','${oid||''}')"><i class="ti ti-check"></i>Save</button>`);
}
function saveOpp(aid,oid){
  const targetId=$('#o_acct').value; const target=acc(targetId);
  if(!target){toast('Pick a customer');return}
  const name=$('#o_name').value.trim(); if(!name){toast('Name required');return}
  const o={name,material:$('#o_material').value.trim(),lane:$('#o_lane').value.trim(),stage:$('#o_stage').value,
    value:parseFloat($('#o_value').value)||0,prob:parseFloat($('#o_prob').value)||0,note:$('#o_note').value.trim(),
    quoteId:$('#o_quote').value||null,customFields:collectCustom(state.settings.opportunityFields),accountId:targetId};
  if(oid&&aid){const src=acc(aid);const ex=src.opportunities.find(x=>x.id===oid);
    if(aid===targetId){Object.assign(ex,o)} else {src.opportunities=src.opportunities.filter(x=>x.id!==oid);target.opportunities.push({...o,id:oid})}}
  else{target.opportunities.push({id:uid('opp'),...o})}
  save();closeModal();render();toast('Opportunity saved');
}
function delOpp(aid,oid){if(!confirm('Delete this opportunity?'))return;const a=acc(aid);a.opportunities=a.opportunities.filter(x=>x.id!==oid);save();closeModal();render();toast('Opportunity deleted')}

/* quote view / add / convert */
function viewQuote(id){const q=state.quotes.find(x=>String(x.id)===String(id));if(!q)return;const a=q.accountId?acc(q.accountId):null;
  const rows=[['Type',q.quoteType],['Customer',a?a.company:q.customerName+' (unlinked)'],['Contact',q.contactName],['Product',q.productType],
    ['Origin',q.origin],['Destination',q.destination],['Miles',q.miles],['Tons',q.tons],['Rate/ton',money(q.ratePerTon)],
    ['Rate/ton + FSC',money(q.ratePerTonWithFSC)],['Total revenue',money(q.totalRevenue)],['Bottom line',money(q.bottomLine)],
    ['ROR',Math.round(q.ror)+'%'],['$/mile',money(q.revenuePerMile)],['$/hour',money(q.revenuePerHour)],['Saved',new Date(q.timestamp).toLocaleString()]];
  const custs=accountsIn('customer');
  openModal('Quote \u2014 '+(q.projectName!=='N/A'?q.projectName:q.productType),
    `<table class="grid" style="margin:-4px 0 6px">${rows.map(([k,v])=>`<tr><td class="muted" style="width:42%">${esc(k)}</td><td style="text-align:right;font-weight:500">${esc(v)}</td></tr>`).join('')}</table>
     <div class="sub-h">Link to customer<span class="ln"></span></div>
     <div class="frow one">${fSelect('q_acct','Customer',q.accountId||'',[['','\u2014 unlinked \u2014'],...custs.map(c=>[c.id,c.company])])}</div>`,
    `<button class="btn btn-danger" onclick="delQuote('${q.id}')"><i class="ti ti-trash"></i>Delete</button><div class="spacer"></div>
     <button class="btn" onclick="relinkQuote('${q.id}')"><i class="ti ti-link"></i>Save link</button>
     <button class="btn btn-orange" onclick="quoteToOpp('${q.id}')"><i class="ti ti-target"></i>Make opportunity</button>`,true);
}
function relinkQuote(id){const q=state.quotes.find(x=>String(x.id)===String(id));q.accountId=$('#q_acct').value||null;save();closeModal();render();toast('Quote linked')}
function quoteToOpp(id){const q=state.quotes.find(x=>String(x.id)===String(id));const aid=$('#q_acct').value||q.accountId;
  const a=aid?acc(aid):null; if(!a){toast('Link a customer first');return}
  q.accountId=a.id;
  a.opportunities.push({id:uid('opp'),name:(q.projectName!=='N/A'?q.projectName:q.productType+' lane'),material:q.productType,
    lane:q.origin+' \u2192 '+q.destination,stage:'Quoted',value:Math.round((q.totalRevenue||0)),prob:50,
    note:'From quote '+id+' \u2014 ROR '+Math.round(q.ror)+'%',quoteId:q.id,customFields:{},accountId:a.id});
  save();closeModal();ui.view='records';ui.filter='all';ui.selId=a.id;render();toast('Opportunity created from quote');
}
function addQuote(aid){const a=aid?acc(aid):null;const custs=accountsIn('customer');
  openModal('Log a quote',
    `<div class="frow">${fSelect('nq_acct','Customer',aid||'',[['','\u2014 none \u2014'],...custs.map(c=>[c.id,c.company])])}${fSelect('nq_type','Type','Pneumatic',['Pneumatic','Flatbed'])}</div>
     <div class="frow">${fInput('nq_proj','Project',a?'':'','text')}${fInput('nq_prod','Product / material','')}</div>
     <div class="frow">${fInput('nq_origin','Origin','')}${fInput('nq_dest','Destination','')}</div>
     <div class="frow">${fInput('nq_rev','Total revenue ($)','','number')}${fInput('nq_ror','ROR %','','number')}</div>
     <div class="hint" style="margin-top:6px;font-size:11.5px;color:var(--faint)">Tip: quotes built in the NAJ rate calculator are saved here automatically when both run on the same site.</div>`,
    `<div class="spacer"></div><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-orange" onclick="saveNewQuote()"><i class="ti ti-check"></i>Save quote</button>`);
}
function saveNewQuote(){const aid=$('#nq_acct').value;const a=aid?acc(aid):null;
  const q={id:Date.now(),timestamp:new Date().toISOString(),quoteType:$('#nq_type').value,
    customerName:a?a.company:'N/A',projectName:$('#nq_proj').value.trim()||'N/A',contactName:'N/A',
    productType:$('#nq_prod').value.trim()||'N/A',origin:$('#nq_origin').value.trim()||'N/A',destination:$('#nq_dest').value.trim()||'N/A',
    totalRevenue:parseFloat($('#nq_rev').value)||0,bottomLine:0,ror:parseFloat($('#nq_ror').value)||0,revenuePerMile:0,revenuePerHour:0,
    miles:0,tons:0,ratePerTon:0,ratePerTonWithFSC:0,accountId:aid||null};
  state.quotes.unshift(q);save();closeModal();render();toast('Quote saved');
}
function delQuote(id){if(!confirm('Delete this quote?'))return;state.quotes=state.quotes.filter(x=>String(x.id)!==String(id));save();closeModal();render();toast('Quote deleted')}

/* settings actions */
function toggleContainer(i){state.settings.containers[i].enabled=!state.settings.containers[i].enabled;save();render()}
function addSeg(){const l=prompt('New account type label:');if(!l)return;const key=l.toLowerCase().replace(/[^a-z0-9]+/g,'-');state.settings.segments.push({key,label:l});save();render()}
function rmSeg(i){state.settings.segments.splice(i,1);save();render()}
function addStage(){const l=prompt('New stage name:');if(!l)return;state.settings.stages.push(l);save();render()}
function rmStage(i){state.settings.stages.splice(i,1);save();render()}
function addField(kind){const label=prompt('Field label (e.g. Account #, Credit terms):');if(!label)return;
  const type=(prompt('Type: text or number','text')||'text').toLowerCase()==='number'?'number':'text';
  const key=label.toLowerCase().replace(/[^a-z0-9]+/g,'_');
  state.settings[kind+'Fields'].push({key,label,type});save();render();toast('Field added')}
function rmField(kind,i){state.settings[kind+'Fields'].splice(i,1);save();render()}
function exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='naj_crm_backup.json';a.click();URL.revokeObjectURL(u);toast('Backup downloaded')}
function resetData(){if(!confirm('Reset to the original book? This clears your edits in this browser.'))return;
  state=JSON.parse(JSON.stringify(SEED));mergeCalcQuotes();save();ui={view:'records',filter:'all',q:'',selId:null,oppView:'kanban'};render();toast('Reset to seed')}

function newMenu(){openModal('Add new',
  `<div style="display:grid;gap:10px">
    <button class="btn" style="justify-content:flex-start;padding:14px" onclick="closeModal();editAccount(null)"><i class="ti ti-building-warehouse"></i> Account (customer / broker / carrier)</button>
    <button class="btn" style="justify-content:flex-start;padding:14px" onclick="closeModal();addOpp(null)"><i class="ti ti-target"></i> Opportunity</button>
    <button class="btn" style="justify-content:flex-start;padding:14px" onclick="closeModal();addQuote(null)"><i class="ti ti-file-invoice"></i> Quote</button>
  </div>`,`<div class="spacer"></div><button class="btn" onclick="closeModal()">Close</button>`);
}

/* ---------- render ---------- */
function render(){
  document.getElementById('root').innerHTML=shell();
  const v=document.getElementById('view');
  if(ui.view==='records') v.innerHTML=recordsView();
  else if(ui.view==='opps') v.innerHTML=oppsViewPage();
  else if(ui.view==='quotes') v.innerHTML=quotesViewPage();
  else if(ui.view==='settings') v.innerHTML=settingsViewPage();
  // wire searches
  const g=$('#gsearch'); if(g)g.oninput=e=>{ui.q=e.target.value;const p=e.target.selectionStart;render();const n=$('#gsearch');if(n){n.focus();n.setSelectionRange(p,p)}};
  const lp=$('#lpq'); if(lp)lp.oninput=e=>{ui.q=e.target.value;const p=e.target.selectionStart;render();const n=$('#lpq');if(n){n.focus();n.setSelectionRange(p,p)}};
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
load();
ui.mobile=MQ.matches;
MQ.addEventListener('change',e=>{ui.mobile=e.matches;ui.mPane='list';render()});
document.getElementById('root').innerHTML='';
render();
</script>
</body></html>
